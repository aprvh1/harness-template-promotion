# Template Promotion Configuration
# Defines which pipelines belong to which promotion tier

promotion_tiers:
  canary:
    description: "Initial testing tier - first to receive template updates"
    observation_period: "24h"
    pipelines:
      - test-pipeline-1
      - dev-pipeline-2
    auto_promote: false

  early_adopters:
    description: "Early adopter tier - non-critical production pipelines"
    observation_period: "72h"
    pipelines:
      - service-a-prod
      - service-b-prod
      - api-gateway-prod
    auto_promote: false

  stable:
    description: "Stable tier - critical production pipelines"
    observation_period: "168h"
    pipelines:
      - critical-service-prod
      - payment-pipeline-prod
      - auth-service-prod
      - core-api-prod
    auto_promote: false

# Template version tracking
template_versions:
  stage_template:
    current: v1.0.0
    available:
      - version: v1.0.0
        status: stable
        deployed_tiers:
          - canary
          - early_adopters
          - stable

  pipeline_template:
    current: v1.0.0
    available:
      - version: v1.0.0
        status: stable
        deployed_tiers:
          - canary
          - early_adopters
          - stable

# Promotion workflow settings
promotion_settings:
  require_approval: true
  notification_channels:
    - slack
    - email
  validation_required: true
  rollback_on_failure: true

  # Success criteria for promotion
  success_criteria:
    min_success_rate: 95
    max_error_rate: 2
    min_observation_hours: 24
