version: "1.0.0"
created: "2026-04-07"
author: "platform-team"
changelog: "Initial release of CI pipeline template"
status: "stable"
breaking_changes: false

description: |
  A comprehensive CI/CD pipeline template with build, test, publish, and deployment stages.

  Features:
  - Code checkout and dependency installation
  - Automated testing with JUnit report integration
  - Docker image build and push
  - Artifact publishing to registry
  - Automatic deployment to dev environment
  - Uses deploy stage template for deployment

  Runtime Inputs:
  - connectorRef: Git connector for code checkout
  - repoName: Repository name
  - build: Build configuration (branch/tag/PR)
  - service_name: Name of the service
  - image_repo: Docker registry repository
  - image_tag: Image tag/version

  Stages:
  1. Build: Install dependencies, run tests, build Docker image
  2. Publish: Publish artifacts and create release tags
  3. Deploy to Dev: Deploy using stage template

compatibility:
  harness_version: ">=1.0.0"
  required_templates:
    - deploy_stage: v1.0.0
  required_connectors:
    - Docker registry connector
    - Git connector

validation_required:
  - Docker registry credentials
  - Git repository access
  - Harness service configuration
  - Dev environment setup

usage_example: |
  pipeline:
    name: My Service CI/CD
    identifier: my_service_cicd
    template:
      templateRef: ci_pipeline
      versionLabel: v1.0.0
      templateInputs:
        properties:
          ci:
            codebase:
              connectorRef: github_connector
              repoName: my-service
              build:
                type: branch
                spec:
                  branch: main
        variables:
          - name: service_name
            value: my-service
          - name: image_repo
            value: myregistry/my-service
          - name: image_tag
            value: <+pipeline.sequenceId>
