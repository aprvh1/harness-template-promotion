template:
  name: CI Pipeline Template
  identifier: ci_pipeline
  versionLabel: v1.0.0
  type: Pipeline
  spec:
    stages:
      - stage:
          name: Build
          identifier: build
          type: CI
          spec:
            cloneCodebase: true
            platform:
              os: Linux
              arch: Amd64
            runtime:
              type: Cloud
              spec: {}
            execution:
              steps:
                - step:
                    name: Install Dependencies
                    identifier: installDeps
                    type: Run
                    spec:
                      shell: Bash
                      command: |
                        echo "Installing dependencies..."
                        # Add your dependency installation commands
                        # npm install, pip install, etc.
                - step:
                    name: Run Tests
                    identifier: runTests
                    type: Run
                    spec:
                      shell: Bash
                      command: |
                        echo "Running tests..."
                        # Add your test commands
                        # npm test, pytest, etc.
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - "**/*.xml"
                - step:
                    name: Build Artifact
                    identifier: buildArtifact
                    type: BuildAndPushDockerRegistry
                    spec:
                      connectorRef: <+input>
                      repo: <+pipeline.variables.image_repo>
                      tags:
                        - <+pipeline.variables.image_tag>
                        - latest
                      dockerfile: Dockerfile
      - stage:
          name: Publish
          identifier: publish
          type: CI
          spec:
            cloneCodebase: false
            platform:
              os: Linux
              arch: Amd64
            runtime:
              type: Cloud
              spec: {}
            execution:
              steps:
                - step:
                    name: Publish to Registry
                    identifier: publishRegistry
                    type: Run
                    spec:
                      shell: Bash
                      command: |
                        echo "Publishing artifact..."
                        echo "Image: <+pipeline.variables.image_repo>:<+pipeline.variables.image_tag>"
                - step:
                    name: Create Release Tag
                    identifier: createTag
                    type: Run
                    spec:
                      shell: Bash
                      command: |
                        echo "Creating release tag..."
                        git tag <+pipeline.variables.image_tag>
                        # git push origin <+pipeline.variables.image_tag>
      - stage:
          name: Deploy to Dev
          identifier: deploy_dev
          template:
            templateRef: deploy_stage
            versionLabel: v1.0.0
            templateInputs:
              type: Deployment
              spec:
                service:
                  serviceRef: <+pipeline.variables.service_name>
                environment:
                  environmentRef: dev
              variables:
                - name: environment
                  type: String
                  value: dev
                - name: service_name
                  type: String
                  value: <+pipeline.variables.service_name>
    properties:
      ci:
        codebase:
          connectorRef: <+input>
          repoName: <+input>
          build: <+input>
    variables:
      - name: service_name
        type: String
        description: Name of the service
        required: true
        value: <+input>
      - name: image_repo
        type: String
        description: Docker image repository
        required: true
        value: <+input>
      - name: image_tag
        type: String
        description: Docker image tag
        required: true
        value: <+input>.default("latest")
    tags:
      templateVersion: v1.0.0
