version: "1.0.0"
created: "2026-04-07"
author: "platform-team"
changelog: "Initial release of deploy stage template"
status: "stable"
breaking_changes: false

description: |
  A reusable deployment stage template for Kubernetes deployments.

  Features:
  - Kubernetes manifest application
  - Approval gate for production deployments
  - Rolling deployment strategy
  - Post-deployment verification
  - Automatic rollback on failure

  Runtime Inputs:
  - serviceRef: Reference to Harness service
  - environmentRef: Reference to Harness environment
  - infrastructureDefinitions: Infrastructure to deploy to
  - environment: Target environment name (dev, test, prod)
  - service_name: Name of the service being deployed

compatibility:
  harness_version: ">=1.0.0"
  deployment_types:
    - Kubernetes

validation_required:
  - Kubernetes cluster connectivity
  - Service and environment configurations
  - Approval group permissions

usage_example: |
  stages:
    - stage:
        name: Deploy to Production
        identifier: deploy_prod
        template:
          templateRef: deploy_stage
          versionLabel: v1.0.0
          templateInputs:
            serviceRef: my-service
            environmentRef: prod
            environment: prod
            service_name: my-service
