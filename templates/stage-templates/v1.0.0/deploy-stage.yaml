template:
  name: Deploy Stage Template
  identifier: deploy_stage
  versionLabel: v1.0.0
  type: Stage
  spec:
    type: Deployment
    spec:
      deploymentType: Kubernetes
      service:
        serviceRef: <+input>
        serviceInputs: <+input>
      environment:
        environmentRef: <+input>
        deployToAll: false
        infrastructureDefinitions: <+input>
      execution:
        steps:
          - step:
              name: Fetch Manifests
              identifier: fetchManifests
              type: K8sApply
              timeout: 10m
              spec:
                filePaths:
                  - manifests/deployment.yaml
                  - manifests/service.yaml
                skipDryRun: false
                skipSteadyStateCheck: false
          - step:
              name: Approval
              identifier: approval
              type: HarnessApproval
              timeout: 1d
              spec:
                approvalMessage: Please review and approve deployment to <+stage.variables.environment>
                includePipelineExecutionHistory: true
                approvers:
                  userGroups:
                    - account._account_all_users
                  minimumCount: 1
                  disallowPipelineExecutor: false
                approverInputs: []
              when:
                stageStatus: Success
                condition: <+stage.variables.environment> == "prod"
          - step:
              name: Rolling Deployment
              identifier: rollingDeployment
              type: K8sRollingDeploy
              timeout: 10m
              spec:
                skipDryRun: false
                pruningEnabled: false
          - step:
              name: Verify Deployment
              identifier: verifyDeployment
              type: ShellScript
              timeout: 5m
              spec:
                shell: Bash
                onDelegate: true
                source:
                  type: Inline
                  spec:
                    script: |
                      #!/bin/bash
                      echo "Verifying deployment..."
                      # Add your verification logic here
                      # Example: Check pod status, run health checks, etc.
                      kubectl get pods -n <+infra.namespace>
                      echo "Verification complete"
                environmentVariables: []
                outputVariables: []
        rollbackSteps:
          - step:
              name: Rollback Deployment
              identifier: rollbackDeployment
              type: K8sRollingRollback
              timeout: 10m
              spec:
                pruningEnabled: false
    variables:
      - name: environment
        type: String
        description: Target environment (dev, test, prod)
        required: true
        value: <+input>
      - name: service_name
        type: String
        description: Name of the service being deployed
        required: true
        value: <+input>
    tags:
      templateVersion: v1.0.0
